<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회사 홈페이지</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      color: #333;
    }
    header {
      background-color: #004080;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }
    header h1 {
      margin: 0;
    }
    section {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h2 {
      color: #004080;
    }
    p {
      line-height: 1.6;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    input, textarea {
      padding: 10px;
      margin: 10px 0;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background-color: #004080;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background-color: #0066cc;
    }
    footer {
      text-align: center;
      padding: 20px;
      background-color: #eee;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- 헤더 -->
  <header>
    <h1>우리 회사</h1>
    <p>여기는 회사 홈페이지입니다</p>
  </header>

  <!-- 회사 소개 -->
  <section id="about">
    <h2>회사 소개</h2>
    <p>우리 회사는 고객을 최우선으로 생각하며 최고의 서비스를 제공합니다. 
    작은 회사지만 신뢰와 품질을 최우선으로 합니다.</p>
  </section>

  <!-- 서비스 소개 -->
  <section id="services">
    <h2>서비스</h2>
    <p>웹 개발, 디자인, 컨설팅 등 다양한 서비스를 제공합니다. 문의 주시면 친절하게 안내드립니다.</p>
  </section>

  <!-- 문의 폼 -->
  <section id="contact">
    <h2>문의하기</h2>
    <form action="https://formspree.io/f/yourformid" method="POST">
      <input type="text" name="name" placeholder="이름" required>
      <input type="email" name="email" placeholder="이메일" required>
      <textarea name="message" rows="5" placeholder="메시지" required></textarea>
      <button type="submit">보내기</button>
    </form>
    <p>폼 제출 후 이메일로 답변드리겠습니다.</p>
  </section>

  <!-- 푸터 -->
  <footer>
    &copy; 2026 우리 회사. All rights reserved.
  </footer>

</body>
</html>
